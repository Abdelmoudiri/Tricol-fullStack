spring:
  datasource:
    url: jdbc:mysql://localhost:3306/tricol_v2?createDatabaseIfNotExist=true
    username: root
    password:
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: create
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQL8Dialect

  liquibase:
    change-log: classpath:/db/changelog/app-changelog.yaml
    default-schema: tricol_v2

  mvc:
    pathmatch:
      matching-strategy: ant_path_matcher

server:
  port: 8080

springdoc:
  api-docs:
    enabled: true
  swagger-ui:
    enabled: true
