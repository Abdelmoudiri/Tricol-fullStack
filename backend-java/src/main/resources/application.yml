# Common application configuration (values shared by all profiles)
spring:
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:mysql://mysql-tricol:3306/tricol_v2}
    username: ${SPRING_DATASOURCE_USERNAME:root}
    password: ${SPRING_DATASOURCE_PASSWORD:root}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQL8Dialect
        format_sql: true

  liquibase:
    change-log: classpath:/db/changelog/app-changelog.xml
    enabled: true

server:
  port: 8080

springdoc:
  api-docs:
    enabled: true
  swagger-ui:
    enabled: true
