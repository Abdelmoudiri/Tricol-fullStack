version: "3.9"

services:
  mysql:
    image: mysql:8
    container_name: mysql-tricol
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: tricol_v2
      MYSQL_USER: root
      MYSQL_PASSWORD: root
    ports:
      - "3307:3306"  # 3307 pour hôte, 3306 dans Docker
    networks:
      - tricol-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      retries: 10
      start_period: 30s

  backend-java:
    build:
      context: ./backend-java     
    container_name: backend-java
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql-tricol:3306/tricol_v2
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: root
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - tricol-network

networks:
  tricol-network:
    driver: bridge
